<!doctype html>
<html lang="es">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CREARDISEÑOS — Completo</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head>
<body class="min-h-screen bg-gray-100">
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">CREARDISEÑOS</h1>
  <div id="user-area" class="flex items-center gap-3">
    <button id="btn-login" class="px-3 py-1 border rounded">Entrar</button>
    <span id="user-name" class="text-sm hidden"></span>
  </div>
</header>
<main class="p-6 max-w-6xl mx-auto">
  <section id="templates" class="mb-6">
    <h2 class="text-2xl font-semibold mb-4">Plantillas</h2>
    <div id="grid" class="grid grid-cols-3 gap-4"></div>
  </section>
  <section id="editor" class="hidden">
    <div class="flex justify-between items-center mb-4">
      <button id="back" class="px-3 py-1 border rounded">← Volver</button>
      <div class="flex gap-2">
        <button id="save-cloud" class="px-3 py-1 bg-indigo-600 text-white rounded">Guardar</button>
        <button id="export-png" class="px-3 py-1 bg-green-600 text-white rounded">PNG</button>
      </div>
    </div>
    <div class="flex gap-4">
      <aside class="w-72 bg-white p-3 rounded shadow">
        <button id="add-text" class="w-full mb-2 border px-2 py-1">Añadir texto</button>
        <input id="image-upload" type="file" accept="image/*" class="mb-2"/>
        <h4 class="mt-4 font-medium">Versiones</h4>
        <div id="versions" class="max-h-40 overflow-auto"></div>
      </aside>
      <div class="flex-1 flex justify-center items-center bg-white p-4 rounded shadow">
        <div id="canvas-wrap" class="p-2 bg-gray-50 rounded"><canvas id="canvas"></canvas></div>
      </div>
    </div>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.6.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Load template grid dynamically
const templates = [
  {id:'social_quote', title:'Cita Inspiradora', src:'assets/templates/social_quote.svg', thumb:'assets/thumbs/social_quote.png', w:1080, h:1080},
  {id:'marketing_sale', title:'Oferta Especial', src:'assets/templates/marketing_sale.svg', thumb:'assets/thumbs/marketing_sale.png', w:1200, h:1200},
  {id:'invitation_party', title:'Invitación', src:'assets/templates/invitation_party.svg', thumb:'assets/thumbs/invitation_party.png', w:1200, h:1600},
  {id:'business_card', title:'Tarjeta Profesional', src:'assets/templates/business_card.svg', thumb:'assets/thumbs/business_card.png', w:1050, h:600},
  {id:'logo_simple', title:'Logotipo', src:'assets/templates/logo_simple.svg', thumb:'assets/thumbs/logo_simple.png', w:800, h:800},
  {id:'event_flyer', title:'Evento', src:'assets/templates/event_flyer.svg', thumb:'assets/thumbs/event_flyer.png', w:1240, h:1754},
  {id:'story_template', title:'Historia', src:'assets/templates/story_template.svg', thumb:'assets/thumbs/story_template.png', w:1080, h:1920},
  {id:'presentation_cover', title:'Portada', src:'assets/templates/presentation_cover.svg', thumb:'assets/thumbs/presentation_cover.png', w:1920, h:1080},
  {id:'brochure', title:'Folleto', src:'assets/templates/brochure.svg', thumb:'assets/thumbs/brochure.png', w:850, h:1100},
  {id:'thankyou_card', title:'Agradecimiento', src:'assets/templates/thankyou_card.svg', thumb:'assets/thumbs/thankyou_card.png', w:800, h:600},
];
const grid = document.getElementById('grid');
templates.forEach(t=> {
  const card = document.createElement('div'); card.className='bg-white p-3 rounded shadow cursor-pointer';
  card.innerHTML = `<img src="${t.thumb}" class="w-full h-40 object-cover rounded"/><h3 class="mt-2 font-medium">${t.title}</h3>`;
  card.onclick = ()=> openEditor(t);
  grid.appendChild(card);
});

// Editor with debounce + simple object lock mechanism
let canvas = null;
let versions = [];
let currentProjectId = 'proj-' + Date.now();
let firebaseConfig = null;
let saveTimeout = null;
let localLock = {}; // {objectId: uid}

async function openEditor(t){
  document.getElementById('templates').classList.add('hidden');
  document.getElementById('editor').classList.remove('hidden');
  const canvasEl = document.getElementById('canvas');
  canvasEl.width = t.w; canvasEl.height = t.h;
  if (canvas) { canvas.dispose(); canvas = null; }
  canvas = new fabric.Canvas('canvas', { backgroundColor:'#fff', preserveObjectStacking:true });
  canvas.setWidth(t.w); canvas.setHeight(t.h);
  // load SVG
  const res = await fetch(t.src); const svgText = await res.text();
  fabric.loadSVGFromString(svgText, function(objects, options) {
    const obj = fabric.util.groupSVGElements(objects, options);
    obj.scaleToWidth(t.w * 0.95);
    // assign stable ids
    obj._cd_id = obj._cd_id || ('obj-' + Date.now());
    canvas.add(obj);
    canvas.renderAll();
    pushVersion();
  });
  // event handlers
  canvas.on('object:modified', ()=> scheduleSaveDebounced());
  canvas.on('object:added', ()=> scheduleSaveDebounced());
  canvas.on('object:removed', ()=> scheduleSaveDebounced());
  // locking: on mouse down, set lock for object and broadcast
  canvas.on('mouse:down', function(e){
    if (e.target && e.target._cd_id) {
      const id = e.target._cd_id;
      // set local lock (in a real implementation we'd broadcast to DB)
      localLock[id] = true;
    }
  });
  canvas.on('mouse:up', function(e){
    if (e.target && e.target._cd_id) {
      const id = e.target._cd_id;
      delete localLock[id];
    }
  });
}

document.getElementById('back').onclick = ()=> { document.getElementById('editor').classList.add('hidden'); document.getElementById('templates').classList.remove('hidden'); if (canvas) canvas.dispose(); canvas=null; }

document.getElementById('add-text').onclick = ()=> { if (!canvas) return; const t = new fabric.IText('Texto', { left:100, top:100, fontSize:40 }); t._cd_id = 'obj-' + Date.now(); canvas.add(t); pushVersion(); scheduleSaveDebounced(); }
document.getElementById('image-upload').addEventListener('change', e=> { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev=> { fabric.Image.fromURL(ev.target.result, img=> { img.scaleToWidth(400); img._cd_id = 'obj-' + Date.now(); canvas.add(img); pushVersion(); scheduleSaveDebounced(); }, { crossOrigin:'anonymous' }); }; r.readAsDataURL(f); });

function pushVersion(){ if (!canvas) return; const snap = JSON.stringify(canvas.toJSON(['selectable','_cd_id'])); versions.push({id:'v-'+Date.now(), snap, at: Date.now()}); renderVersions(); }
function renderVersions(){ const el = document.getElementById('versions'); el.innerHTML=''; versions.slice().reverse().forEach(v=>{ const d = document.createElement('div'); d.className='p-2 border rounded mb-2'; d.innerHTML = `<div class="text-sm">${new Date(v.at).toLocaleString()}</div><div class="mt-1"><button data-id="${v.id}" class="restore px-2 py-1 bg-blue-600 text-white rounded">Restaurar</button></div>`; el.appendChild(d); }); document.querySelectorAll('.restore').forEach(btn=> btn.onclick = ()=> { const id = btn.dataset.id; const v = versions.find(x=> x.id===id); if (v && canvas) { canvas.loadFromJSON(v.snap, ()=> canvas.renderAll()); } }); }

function scheduleSaveDebounced(){ if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(()=> { performSave(); }, 1200); }
async function performSave(){ // prepare payload and save to Firebase if configured
  if (!canvas) return;
  const payload = { json: canvas.toJSON(['selectable','_cd_id']), updatedAt: Date.now() };
  // If firebase-config.json exists and Firebase is initialized, save to realtime DB at /realtime/{currentProjectId}
  if (window.__CD_FIREBASE_READY__) {
    try { await window.__CD_DB_UPDATE__(currentProjectId, payload); console.log('Saved to Firebase realtime.'); } catch(e){ console.error('Firebase save failed', e); }
  } else {
    console.log('Local autosave (no Firebase configured).');
  }
  pushVersion();
}

document.getElementById('export-png').onclick = ()=> { if (!canvas) return; const data = canvas.toDataURL({format:'png'}); const a = document.createElement('a'); a.href = data; a.download='diseño.png'; document.body.appendChild(a); a.click(); a.remove(); }

// Try to fetch firebase-config.json at root and initialize Firebase helpers if present
fetch('/firebase-config.json').then(r=> { if (!r.ok) throw new Error('no config'); return r.json(); }).then(cfg=> {
  // initialize lightweight Firebase helpers via compat (loaded dynamically)
  const script1 = document.createElement('script'); script1.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js'; document.head.appendChild(script1);
  const script2 = document.createElement('script'); script2.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js'; document.head.appendChild(script2);
  const script3 = document.createElement('script'); script3.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js'; document.head.appendChild(script3);
  script3.onload = ()=> {
    try {
      window.firebase.initializeApp(cfg);
      window.__CD_FIREBASE_READY__ = true;
      window.__CD_DB_UPDATE__ = async (projId, payload) => { return window.firebase.database().ref('realtime/' + projId).set(payload); }
      console.log('Firebase initialized from firebase-config.json');
    } catch(e){ console.error(e); }
  };
}).catch(()=> console.log('No firebase-config.json found at root.'));

</script></body></html>
